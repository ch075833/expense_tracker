<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2563eb">
    <title>Expense Tracker</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Monthly Budget</p>
        <h1>Expense Tracker</h1>
        <p class="month-title" id="monthTitle"></p>
      </div>
      <button class="install-button" id="installButton" hidden>Install</button>
    </header>

    <main>
      <section class="summary-grid" aria-label="Expense summary">
        <article class="summary-card wallet-card">
          <span>Wallet</span>
          <strong id="walletDisplay">RM 0.00</strong>
          <button class="ghost-button wallet-edit-button" id="editWalletButton" type="button">Edit</button>
        </article>
        <article class="summary-card">
          <span>Total spent</span>
          <strong id="totalSpent">RM 0.00</strong>
        </article>
        <article class="summary-card">
          <span>Total budget</span>
          <strong id="totalBudget">RM 0.00</strong>
        </article>
        <article class="summary-card" id="remainingCard">
          <span>Remaining</span>
          <strong id="totalRemaining">RM 0.00</strong>
        </article>
      </section>

      <nav class="tab-list" aria-label="Expense tracker sections">
        <button class="tab-button active" type="button" data-tab-target="addExpensePanel" aria-controls="addExpensePanel" aria-selected="true">Add Expense</button>
        <button class="tab-button" type="button" data-tab-target="jarBudgetPanel" aria-controls="jarBudgetPanel" aria-selected="false">Jar Budget</button>
        <button class="tab-button" type="button" data-tab-target="expenseHistoryPanel" aria-controls="expenseHistoryPanel" aria-selected="false">Expense Records</button>
      </nav>

      <section class="tab-panels">
        <form class="panel expense-form tab-panel active" id="addExpensePanel" data-tab-panel>
          <div class="panel-heading">
            <h2>Expenses</h2>
            <button type="reset" class="ghost-button">Clear</button>
          </div>

          <div class="type-row">
            <label>
              Type
              <select id="expenseType" required></select>
            </label>
            <button class="ghost-button" id="manageTypesButton" type="button">Add new expense</button>
          </div>

          <label>
            Amount
            <input id="expenseAmount" type="number" min="0.01" step="0.01" placeholder="0.00" required>
          </label>

          <label>
            Note
            <input id="expenseNote" type="text" maxlength="70" placeholder="Optional">
          </label>

          <label>
            Date
            <input id="expenseDate" type="date" required>
          </label>

          <button type="submit" class="primary-button">Add Expense</button>

          <section class="form-expense-preview" aria-label="Recently entered expenses">
            <div class="panel-heading compact-heading">
              <h2>Entered Expenses</h2>
            </div>
            <div class="expense-list" id="expensePreviewList"></div>
          </section>
        </form>

        <section class="panel limits-panel tab-panel" id="jarBudgetPanel" data-tab-panel hidden>
          <div class="panel-heading">
            <h2>Jar Budgets</h2>
          </div>
          <div class="limits-list" id="jarsList"></div>
        </section>

        <section class="panel tab-panel" id="expenseHistoryPanel" data-tab-panel hidden>
          <div class="panel-heading">
            <h2>Expense Records</h2>
            <div class="filter-row">
              <input id="filterMonth" type="month" aria-label="Filter expenses by month">
              <select id="filterType" aria-label="Filter expenses by type">
                <option value="All">All types</option>
              </select>
            </div>
          </div>
          <section class="spending-overview" aria-label="Spending overview">
            <div class="spending-chart" id="spendingChart">
              <div class="spending-chart-center">
                <span>Total spent</span>
                <strong id="chartTotal">RM 0.00</strong>
              </div>
            </div>
            <div class="chart-legend" id="chartLegend"></div>
          </section>
          <div class="expense-list" id="expenseList"></div>
        </section>
      </section>
    </main>

    <dialog class="type-dialog" id="walletDialog">
      <form class="wallet-dialog-form" id="walletForm">
        <div class="dialog-heading">
          <h2>Edit Wallet</h2>
          <button class="icon-button" id="closeWalletDialogButton" type="button" aria-label="Close wallet editor">x</button>
        </div>
        <label>
          Wallet value
          <input id="walletAmount" type="number" min="0" step="0.01" placeholder="0.00">
        </label>
        <button type="submit" class="primary-button">Save Wallet</button>
      </form>
    </dialog>

    <dialog class="type-dialog" id="typeDialog">
      <div class="dialog-heading">
        <h2>Manage Expense Names</h2>
        <button class="icon-button" id="closeTypeDialogButton" type="button" aria-label="Close type manager">x</button>
      </div>
      <div class="custom-type-row">
        <label>
          Expense name
          <input id="customType" type="text" maxlength="40" placeholder="Phone installment">
        </label>
        <button class="ghost-button" id="addTypeButton" type="button">Add Name</button>
      </div>
      <div class="category-list" id="categoryList"></div>
    </dialog>

    <template id="jarTemplate">
      <article class="limit-row">
        <div>
          <strong></strong>
          <span></span>
        </div>
        <label>
          Budget
          <input type="number" min="0" step="0.01" placeholder="0.00">
        </label>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
